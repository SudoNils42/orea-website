<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Découvrez notre villa de luxe à Bali avec piscine, vue tropicale et toutes les commodités pour des vacances inoubliables. Visite virtuelle 3D disponible." />
  <meta name="keywords" content="villa, Bali, luxe, visite virtuelle, location, piscine, vacances" />
  
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://villa-luxe-bali.com/" />
  <meta property="og:title" content="Villa Luxe Bali Visite 3D" />
  <meta property="og:description" content="Découvrez notre villa de luxe à Bali avec piscine, vue tropicale et toutes les commodités pour des vacances inoubliables." />
  <meta property="og:image" content="/src/assets/og-image.jpg" />
  
  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://villa-luxe-bali.com/" />
  <meta property="twitter:title" content="Villa Luxe Bali Visite 3D" />
  <meta property="twitter:description" content="Découvrez notre villa de luxe à Bali avec piscine, vue tropicale et toutes les commodités pour des vacances inoubliables." />
  <meta property="twitter:image" content="/src/assets/og-image.jpg" />
  
  <!-- Schema.org for Google -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LodgingBusiness",
      "name": "Villa de Luxe à Bali",
      "description": "Villa de luxe à Bali avec 3 chambres, piscine privée et vue tropicale.",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Bali",
        "addressCountry": "ID"
      },
      "image": "/src/assets/villa-bali.jpg",
      "priceRange": "$$$",
      "amenityFeature": [
        { "@type": "LocationFeatureSpecification", "name": "Wi-Fi" },
        { "@type": "LocationFeatureSpecification", "name": "Piscine privée" },
        { "@type": "LocationFeatureSpecification", "name": "Climatisation" },
        { "@type": "LocationFeatureSpecification", "name": "Cuisine équipée" },
        { "@type": "LocationFeatureSpecification", "name": "Service de ménage" },
        { "@type": "LocationFeatureSpecification", "name": "Vue tropicale" }
      ]
    }
  </script>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',

          colors: {
            'pure-white': '#ffffff',
            'deep-black': '#000000',

            'pale-gold': '#E6C67A',
          },
          fontFamily: {
            'inter': ['Inter', 'sans-serif'],
            'lora': ['Lora', 'serif'],
          },
          backdropBlur: {
            'glass': '10px',
          }
        }
      }
    }
  </script>
  
  <!-- AOS Animation Library -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" />
  
  <link rel="icon" type="image/svg+xml" href="/src/assets/favicon.svg" />

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hors ligne - Villa Luxe Bali</title>
  <style>
    /* Styles minimalistes pour la page hors ligne */
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      background-color: #f8f8f8;
      color: #333;
      padding: 1rem;
    }
    
    .container {
      max-width: 600px;
      margin: 0 auto;
    }
    
    h1 {
      font-weight: 900;
      font-size: 2rem;
      margin-bottom: 1rem;
      color: #04593F;
    }
    
    h1 span {
      color: #E6C67A;
    }
    
    p {
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }
    
    .icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }
    
    .button {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background-color: #04593F;
      color: white;
      text-decoration: none;
      border-radius: 0.25rem;
      font-weight: 600;
      transition: background-color 0.3s;
    }
    
    .button:hover {
      background-color: #034933;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background-color: #121212;
        color: #f8f8f8;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📶</div>
    <h1><span>Villa</span>Bali</h1>
    <h2>Vous êtes hors ligne</h2>
    <p>Il semble que vous n'ayez pas de connexion internet actuellement. Veuillez vérifier votre connexion et réessayer.</p>
    <p>Si vous avez besoin d'une assistance immédiate, vous pouvez nous contacter par téléphone au +33 1 23 45 67 89.</p>
    <a href="/" class="button">Réessayer</a>
  </div>
</body>
</html>
